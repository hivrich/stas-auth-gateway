server {
    listen 80;
    listen 443 ssl http2;
    server_name intervals.stas.run 109.172.46.200;

    # SSL (предполагается, что уже настроено системой)
    include snippets/snakeoil.conf;  # если у вас другой include — оставьте его

    # /gw → ПРОД 3338 (без канареек и map)
    location ~* ^/gw(/|$) {
        proxy_pass http://127.0.0.1:3338;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;  # ОБЯЗАТЕЛЬНО
        proxy_http_version 1.1;
    }

    # health
    location = / {
        return 200 "ok\n";
    }
}
